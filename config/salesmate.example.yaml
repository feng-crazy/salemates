# =============================================================================
# SalesMate Configuration
# Copy this to config/salesmate.yaml and customize
# =============================================================================
app:
  host: 0.0.0.0
  port: 18790
  debug: false
  log_level: INFO

gateway:
  host: 0.0.0.0
  port: 18791
  timeout: 30

feishu:
  # Bot credentials (set via FEISHU_APP_ID and FEISHU_APP_SECRET env vars)
  app_id: ${FEISHU_APP_ID}
  app_secret: ${FEISHU_APP_SECRET}
  verification_token: ${FEISHU_VERIFICATION_TOKEN}
  encrypt_key: ${FEISHU_ENCRYPT_KEY}

llm:
  # LLM configuration (set via LLM_API_KEY env var)
  provider: openai  # openai, anthropic, local
  api_key: ${LLM_API_KEY}
  model: gpt-4
  temperature: 0.7
  max_tokens: 2000

database:
  # Connection via DATABASE_URL env var
  pool_size: 10
  max_overflow: 20

redis:
  # Connection via REDIS_URL env var
  max_connections: 50

openviking:
  # OpenViking server (set via OPENVIKING_URL env var)
  url: ${OPENVIKING_URL}
  timeout: 60
  max_retries: 3

workspace:
  path: /app/workspace
  max_file_size: 10485760  # 10MB
  allowed_extensions:
    - .txt
    - .md
    - .json
    - .yaml
    - .yml
    - .pdf